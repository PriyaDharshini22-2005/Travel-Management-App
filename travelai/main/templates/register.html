<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#667eea',
                        secondary: '#764ba2',
                        success: '#28a745',
                        danger: '#dc3545',
                        warning: '#ffc107',
                        info: '#17a2b8',
                        light: '#f8f9fa',
                        dark: '#343a40',
                        white: '#ffffff',
                    }
                }
            }
        }
    </script>
    </head>
    <body>
          <div id="register" class="page">
            <div class="container mx-auto px-5 py-12">
                <div class="max-w-md mx-auto bg-white bg-opacity-95 backdrop-blur-lg rounded-2xl p-8 shadow-lg">
                    <h2 class="text-2xl font-bold text-center mb-8">Create Account</h2>
                   <form method="post" action="{% url 'register' %}">
    {% csrf_token %}

    <div class="mb-6">
        <label for="full_name" class="block font-semibold mb-2">Full Name</label>
        <input type="text" id="full_name" name="full_name"
               class="w-full px-4 py-2 border-2 border-gray-200 rounded-xl focus:border-primary focus:outline-none" required>
    </div>

    <div class="mb-6">
        <label for="email" class="block font-semibold mb-2">Email</label>
        <input type="email" id="email" name="email"
               class="w-full px-4 py-2 border-2 border-gray-200 rounded-xl focus:border-primary focus:outline-none" required>
    </div>

    <div class="mb-6">
        <label for="password" class="block font-semibold mb-2">Password</label>
        <input type="password" id="password" name="password"
               class="w-full px-4 py-2 border-2 border-gray-200 rounded-xl focus:border-primary focus:outline-none" required>
    </div>

    <div class="mb-6">
        <label for="confirm_password" class="block font-semibold mb-2">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password"
               class="w-full px-4 py-2 border-2 border-gray-200 rounded-xl focus:border-primary focus:outline-none" required>
    </div>

    <button type="submit"
            class="w-full px-6 py-3 rounded-xl bg-gradient-to-r from-primary to-secondary text-white font-semibold">
        Register
    </button>
</form>


                </div>
            </div>
        </div>
    </body>
    </html>
