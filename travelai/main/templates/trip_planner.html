<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Planner - Plan Your Perfect Journey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            margin-bottom: 30px;
            border-radius: 15px;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(255, 255, 255, 0.2);
        }

        .hero-section {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        .hero-section h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .hero-section p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 0 auto;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input,
        .form-group select {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .preferences-section {
            margin-bottom: 30px;
        }

        .preferences-section h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .preferences-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .preference-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .preference-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #667eea;
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .hero-section h1 {
                font-size: 2.5rem;
            }

            .form-container {
                padding: 30px 20px;
            }

            .nav-links {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-content">
            <div class="logo">🌍 TripPlanner</div>
            <div class="nav-links">
                <a href="{% url 'trip_planner' %}" class="{% if request.path == '/trip_planner/' %}active{% endif %}">Plan Trip</a>
                <a href="{% url 'hotels' %}" class="{% if request.path == '/hotels/' %}active{% endif %}">Hotels</a>
                <a href="{% url 'places' %}" class="{% if request.path == '/places/' %}active{% endif %}">Places</a>
                <a href="{% url 'expenses' %}" class="{% if request.path == '/expenses/' %}active{% endif %}">Expenses</a>
                <a href="{% url 'profile' %}" class="{% if request.path == '/profile/' %}active{% endif %}">Profile</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="hero-section">
            <h1>Plan Your Dream Trip</h1>
            <p>Discover amazing destinations, find perfect accommodations, and create unforgettable memories with our intelligent trip planner.</p>
        </div>

        <div class="form-container">
            <!-- POST form to Django view -->
            <form method="POST" action="{% url 'trip_planner' %}">
                {% csrf_token %}
                <div class="form-grid">
                    <div class="form-group">
                        <label for="destination">Destination</label>
                        <input type="text" id="destination" name="destination" placeholder="Where do you want to go?" required>
                    </div>

                    <div class="form-group">
                        <label for="travelers">Number of Travelers</label>
                        <select id="travelers" name="travelers" required>
                            <option value="">Select travelers</option>
                            <option value="1">1 Person</option>
                            <option value="2">2 People</option>
                            <option value="3">3 People</option>
                            <option value="4">4 People</option>
                            <option value="5+">5+ People</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="startDate">Start Date</label>
                        <input type="date" id="startDate" name="startDate" required>
                    </div>

                    <div class="form-group">
                        <label for="endDate">End Date</label>
                        <input type="date" id="endDate" name="endDate" required>
                    </div>

                    <div class="form-group">
                        <label for="budget">Budget (USD)</label>
                        <select id="budget" name="budget" required>
                            <option value="">Select budget range</option>
                            <option value="500-1000">$500 - $1,000</option>
                            <option value="1000-2500">$1,000 - $2,500</option>
                            <option value="2500-5000">$2,500 - $5,000</option>
                            <option value="5000-10000">$5,000 - $10,000</option>
                            <option value="10000+">$10,000+</option>
                        </select>
                    </div>
                </div>

                <div class="preferences-section">
                    <h3>Travel Preferences</h3>
                    <div class="preferences-grid">
                        <div class="preference-item">
                            <input type="checkbox" id="adventure" name="preferences" value="adventure">
                            <label for="adventure">Adventure</label>
                        </div>
                        <div class="preference-item">
                            <input type="checkbox" id="culture" name="preferences" value="culture">
                            <label for="culture">Culture</label>
                        </div>
                        <div class="preference-item">
                            <input type="checkbox" id="shopping" name="preferences" value="shopping">
                            <label for="shopping">Shopping</label>
                        </div>
                        <div class="preference-item">
                            <input type="checkbox" id="relaxation" name="preferences" value="relaxation">
                            <label for="relaxation">Relaxation</label>
                        </div>
                        <div class="preference-item">
                            <input type="checkbox" id="nightlife" name="preferences" value="nightlife">
                            <label for="nightlife">Nightlife</label>
                        </div>
                        <div class="preference-item">
                            <input type="checkbox" id="food" name="preferences" value="food">
                            <label for="food">Food & Dining</label>
                        </div>
                        <div class="preference-item">
                            <input type="checkbox" id="nature" name="preferences" value="nature">
                            <label for="nature">Nature</label>
                        </div>
                        <div class="preference-item">
                            <input type="checkbox" id="history" name="preferences" value="history">
                            <label for="history">History</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="generate-btn">Generate My Perfect Trip Plan 🚀</button>
            </form>
        </div>
    </div>

    <script>
        // Set minimum date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('startDate').setAttribute('min', today);
        document.getElementById('endDate').setAttribute('min', today);

        document.getElementById('startDate').addEventListener('change', function() {
            document.getElementById('endDate').setAttribute('min', this.value);
        });
    </script>
</body>
</html>
