<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div class="container mx-auto px-5 py-12">
    <div class="max-w-md mx-auto bg-white rounded-2xl p-8 shadow-lg">
        <h2 class="text-2xl font-bold text-center mb-8">Welcome Back</h2>

        {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                    <p class="text-center text-{{ message.tags }}">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="mb-6">
                <label class="block font-semibold mb-2">Email</label>
                <input type="email" name="email" class="w-full px-4 py-2 border rounded-xl" required>
            </div>

            <div class="mb-6">
                <label class="block font-semibold mb-2">Password</label>
                <input type="password" name="password" class="w-full px-4 py-2 border rounded-xl" required>
            </div>

            <button type="submit" class="w-full px-6 py-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-500 text-white font-semibold">
                Login
            </button>

            <p class="text-center mt-4">
                Don't have an account? <a href="{% url 'register' %}" class="text-blue-500 font-semibold">Sign up</a>
            </p>
        </form>
    </div>
</div>
</body>
</html>
